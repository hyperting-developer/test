  - name: Configure git
    run: |
      git config user.name "automation-bot"
      git config user.email "no-reply@example.com"

  - name: Append text to README.md
    run: |
      echo 'modificato con relevance' >> README.md
      git add README.md
      git commit -m "Fix: aggiornamento README - modificato con relevance" || echo "No changes to commit"

  - name: Push changes
    run: |
      git push origin HEAD:fix/readme-modificato-con-relevance
    env:
      GITHUB_TOKEN: ${{ secrets.AGENT_PAT }}

  - name: Create Pull Request
    uses: peter-evans/create-pull-request@v5
    with:
      token: ${{ secrets.AGENT_PAT }}
      commit-message: Fix: aggiornamento README - modificato con relevance
      branch: fix/readme-modificato-con-relevance
      title: Fix: aggiornamento README - modificato con relevance
      body: |
        Riepilogo: richiesta di append al README.md con la stringa "modificato con relevance".
        Branch: fix/readme-modificato-con-relevance
        Note di testing: semplice append testuale.
      base: main
