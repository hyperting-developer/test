name: GitHub Issues to Trello

on:
  issues:
    types: [opened, labeled]

jobs:
  create-trello-card:
    runs-on: ubuntu-latest

    steps:
      - name: Determine Trello list
        id: routing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(label => {
              if (typeof label === 'string') return label.toLowerCase();
              return (label.name || '').toLowerCase();
            });

            let listName = 'To do';
            if (labels.includes('bug')) {
              listName = 'Bug';
            } else if (labels.includes('enhancement') || labels.includes('feature')) {
              listName = 'Ideas';
            }

            core.setOutput('list_name', listName);
            core.setOutput('labels', labels.join(', '));

      - name: Create Trello card
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_NAME: Test
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          ISSUE_LABELS: ${{ steps.routing.outputs.labels }}
          TRELLO_LIST_NAME: ${{ steps.routing.outputs.list_name }}
        run: |
          set -e

          CARD_NAME="[#${ISSUE_NUMBER}] ${ISSUE_TITLE}"

          CARD_DESC=$(cat <<EOF
Repository: ${{ github.repository }}
Issue URL: ${ISSUE_URL}
Autore: ${ISSUE_USER}
Stato: ${ISSUE_STATE}
Labels: ${ISSUE_LABELS}

Descrizione issue:
${ISSUE_BODY}
EOF
)

          BOARD_RESPONSE=$(curl -s "https://api.trello.com/1/members/me/boards?fields=name,url,id&key=${TRELLO_API_KEY}&token=${TRELLO_TOKEN}")
          echo "$BOARD_RESPONSE" > /tmp/boards.json

          LIST_ID=$(python3 - <<'PY'
import json
import os
import requests

key = os.environ['TRELLO_API_KEY']
token = os.environ['TRELLO_TOKEN']
board_name = os.environ['TRELLO_BOARD_NAME']
list_name = os.environ['TRELLO_LIST_NAME']

with open('/tmp/boards.json', 'r', encoding='utf-8') as f:
    boards = json.load(f)

board = next((b for b in boards if b.get('name') == board_name), None)
if not board:
    raise SystemExit(f"Board Trello non trovata: {board_name}")

board_id = board['id']
resp = requests.get(
    f"https://api.trello.com/1/boards/{board_id}/lists",
    params={
        'key': key,
        'token': token,
        'fields': 'name',
        'filter': 'open'
    }
)
resp.raise_for_status()
lists = resp.json()

selected_list = next((l for l in lists if l.get('name') == list_name), None)
if not selected_list:
    raise SystemExit(f"Lista Trello non trovata nella board '{board_name}': {list_name}")

print(selected_list['id'])
PY
)

          curl --fail --request POST \
            --url "https://api.trello.com/1/cards" \
            --data-urlencode "key=${TRELLO_API_KEY}" \
            --data-urlencode "token=${TRELLO_TOKEN}" \
            --data-urlencode "idList=${LIST_ID}" \
            --data-urlencode "name=${CARD_NAME}" \
            --data-urlencode "desc=${CARD_DESC}"
