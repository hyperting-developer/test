name: GitHub Issues to Trello

on:
  issues:
    types: [opened]

jobs:
  create-trello-card:
    runs-on: ubuntu-latest

    steps:
      - name: Determine Trello list
        id: routing
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(label =>
              (typeof label === 'string' ? label : (label.name || '')).toLowerCase()
            );

            let listName = 'To do';
            if (labels.includes('bug')) {
              listName = 'Bug';
            } else if (labels.includes('enhancement') || labels.includes('feature')) {
              listName = 'Ideas';
            }

            core.setOutput('list_name', listName);
            core.setOutput('labels', labels.join(', '));

      - name: Create Trello card
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_NAME: Test
          TRELLO_LIST_NAME: ${{ steps.routing.outputs.list_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          ISSUE_LABELS: ${{ steps.routing.outputs.labels }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          CARD_NAME="[#${ISSUE_NUMBER}] ${ISSUE_TITLE}"

          CARD_DESC=$(printf '%s\n' \
            "Repository: ${GITHUB_REPOSITORY}" \
            "Issue URL: ${ISSUE_URL}" \
            "Autore: ${ISSUE_USER}" \
            "Stato: ${ISSUE_STATE}" \
            "Labels: ${ISSUE_LABELS}" \
            "" \
            "Descrizione issue:" \
            "${ISSUE_BODY}")

          BOARDS_JSON=$(curl -fsSL "https://api.trello.com/1/members/me/boards?fields=name,id&key=${TRELLO_API_KEY}&token=${TRELLO_TOKEN}")

          BOARD_ID=$(echo "$BOARDS_JSON" | jq -r --arg BOARD_NAME "$TRELLO_BOARD_NAME" '.[] | select(.name == $BOARD_NAME) | .id' | head -n 1)

          if [ -z "${BOARD_ID}" ] || [ "${BOARD_ID}" = "null" ]; then
            echo "Board Trello non trovata: ${TRELLO_BOARD_NAME}"
            exit 1
          fi

          LISTS_JSON=$(curl -fsSL "https://api.trello.com/1/boards/${BOARD_ID}/lists?fields=name&filter=open&key=${TRELLO_API_KEY}&token=${TRELLO_TOKEN}")

          LIST_ID=$(echo "$LISTS_JSON" | jq -r --arg LIST_NAME "$TRELLO_LIST_NAME" '.[] | select(.name == $LIST_NAME) | .id' | head -n 1)

          if [ -z "${LIST_ID}" ] || [ "${LIST_ID}" = "null" ]; then
            echo "Lista Trello non trovata nella board '${TRELLO_BOARD_NAME}': ${TRELLO_LIST_NAME}"
            exit 1
          fi

          curl -fsSL -X POST "https://api.trello.com/1/cards" \
            --data-urlencode "key=${TRELLO_API_KEY}" \
            --data-urlencode "token=${TRELLO_TOKEN}" \
            --data-urlencode "idList=${LIST_ID}" \
            --data-urlencode "name=${CARD_NAME}" \
            --data-urlencode "desc=${CARD_DESC}"
